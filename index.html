<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KCNX OS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; overflow:hidden; font-family:Segoe UI; background:black; color:white; }

/* Boot */
#boot {
  position:fixed; width:100%; height:100%; background:black;
  display:flex; justify-content:center; align-items:center; flex-direction:column;
  transition:opacity 2s;
}
#logo { font-size:60px; letter-spacing:8px; opacity:0; transition:2s; }
#sub { font-size:14px; opacity:0; margin-top:10px; transition:2s; }

/* Desktop */
#desktop {
  display:none;
  width:100vw; height:100vh;
  background:linear-gradient(#0a0a0a,#1e1e2f);
}

/* Icons */
.icon { margin:20px; cursor:pointer; }

/* Taskbar */
#taskbar {
  position:absolute; bottom:0; width:100%; height:40px;
  background:#111; display:flex; justify-content:space-between; align-items:center;
  padding:0 10px;
}

/* Window FULL */
.window {
  position:absolute; top:0; left:0;
  width:100%; height:100%;
  background:#1e1e2f;
}

/* Titlebar */
.titlebar {
  background:#00ffcc;
  padding:10px;
  display:flex;
  justify-content:space-between;
  font-weight:bold;
}

/* Content */
.content {
  height:calc(100% - 50px);
  padding:10px;
}

/* Calculator */
.calc button {
  width:22%; height:50px; margin:2px;
  font-size:18px;
}
.calc input {
  width:95%; height:40px; font-size:18px;
  margin-bottom:5px;
}

/* Right click */
#menu {
  position:absolute;
  display:none;
  background:#111;
  padding:10px;
  border-radius:5px;
}
</style>
</head>

<body>

<!-- Boot -->
<div id="boot">
  <div id="logo">KCNX</div>
  <div id="sub">Kedlestone Cartes Normal Xenodocial</div>
</div>

<!-- Desktop -->
<div id="desktop">

<div class="icon" onclick="openApp('notepad')">📝 Notepad</div>
<div class="icon" onclick="openApp('calc')">🧮 Calculator</div>
<div class="icon" onclick="openApp('browser')">🌐 Browser</div>
<div class="icon" onclick="openApp('recycle')">🗑️ Recycle Bin</div>

<div id="taskbar">
<span>KCNX OS</span>
<span id="clock"></span>
</div>

</div>

<!-- Right click -->
<div id="menu">
  <div onclick="location.reload()">Refresh</div>
</div>

<!-- Audio -->
<audio id="audio" src="https://files.catbox.moe/qmismt.mp3"></audio>

<script>

// Boot timing
setTimeout(()=>{ logo.style.opacity=1; sub.style.opacity=1; },6000);
setTimeout(()=>{ boot.style.opacity=0; },12000);
setTimeout(()=>{
  boot.style.display="none";
  desktop.style.display="block";
  audio.currentTime=15;
  audio.play().catch(()=>{});
},15000);

// Audio unlock (mobile)
document.body.addEventListener("click", ()=>{
  audio.play().catch(()=>{});
},{once:true});

// Clock
setInterval(()=>{
  clock.innerText=new Date().toLocaleTimeString();
},1000);

// Open apps
function openApp(app){
  let win=document.createElement("div");
  win.className="window";

  let bar=document.createElement("div");
  bar.className="titlebar";
  bar.innerHTML=app + " <span onclick='this.parentElement.parentElement.remove()'>❌</span>";

  let content=document.createElement("div");
  content.className="content";

  // Notepad
  if(app=="notepad"){
    content.innerHTML=`
    <button onclick="saveNote()">💾 Save</button>
    <textarea id="note" style="width:100%;height:90%"></textarea>`;
    setTimeout(()=> note.value=localStorage.note||"",100);
  }

  // Calculator
  if(app=="calc"){
    content.innerHTML=`
    <div class="calc">
      <input id="display">
      <br>
      <button onclick="add('7')">7</button>
      <button onclick="add('8')">8</button>
      <button onclick="add('9')">9</button>
      <button onclick="add('/')">÷</button><br>
      <button onclick="add('4')">4</button>
      <button onclick="add('5')">5</button>
      <button onclick="add('6')">6</button>
      <button onclick="add('*')">×</button><br>
      <button onclick="add('1')">1</button>
      <button onclick="add('2')">2</button>
      <button onclick="add('3')">3</button>
      <button onclick="add('-')">−</button><br>
      <button onclick="add('0')">0</button>
      <button onclick="add('.')">.</button>
      <button onclick="calculate()">=</button>
      <button onclick="add('+')">+</button>
    </div>`;
  }

  // Browser
  if(app=="browser"){
    content.innerHTML=`
    <input id="url" placeholder="Enter website" style="width:80%">
    <button onclick="go()">Go</button>
    <p>Opens in new tab</p>`;
  }

  // Recycle bin
  if(app=="recycle"){
    content.innerHTML=`<h3>Recycle Bin</h3><p>Empty 🗑️</p>`;
  }

  win.appendChild(bar);
  win.appendChild(content);
  desktop.appendChild(win);
}

// Notepad save
function saveNote(){
  localStorage.note=document.getElementById("note").value;
  alert("Saved!");
}

// Calculator
function add(v){
  document.getElementById("display").value+=v;
}
function calculate(){
  try{
    document.getElementById("display").value=
    eval(document.getElementById("display").value);
  }catch{
    alert("Error");
  }
}

// Browser
function go(){
  let u=document.getElementById("url").value;
  if(!u.startsWith("http")) u="https://"+u;
  window.open(u,"_blank");
}

// Right click
document.oncontextmenu=(e)=>{
  e.preventDefault();
  menu.style.display="block";
  menu.style.left=e.pageX+"px";
  menu.style.top=e.pageY+"px";
};
document.onclick=()=> menu.style.display="none";

</script>

</body>
  </html>
